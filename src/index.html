<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="css/startScreen.css">
    <link rel="stylesheet" href="css/optionsDialog.css">
    <script src="js/buttonFuctions.js"></script>
    <title>Discord Bot Builder</title>
</head>

<html>

<body class="mainBody">

    <div class="selection">

        <div class="buttons">

            <h2 class="startScreenText">Start</h2>

            <a class="startOpt" id="newBot">Create New Bot...</a>

            <a class="startOpt" id="openBot">Open Existing Bot...</a>

        </div>

        <div class="recent">

            <h2 class="recentScreenText">Recent</h2>

            <div class="recentBots">


                <p>This is where recent projects will show up</p>


            </div>

        </div>


    </div>


    <div class="newBotForm" id="newBotForm">
        <div class="formContent">
            <form>

                <div class="nameDiv">
                    <input placeholder=" " class="nameInput" type="text" id="botName">
                    <label class="nameLabel" for="botName">Bot Name</label>
                </div>

                <div class="tokenDiv">
                    <input placeholder=" " class="tokenInput" type="text" id="botToken">
                    <label class="tokenLabel" for="botToken">Bot Token</label>
                </div>

                <div class="prefixDiv">
                    <input placeholder=" " class="prefixInput" type="text" id="botPrefix">
                    <label class="prefixLabel" for="botPrefix">Bot Prefix</label>
                </div>

                <input class="optionsSaveButton" type="button" value="Save" id="submitData">

            </form>
        </div>
    </div>


</body>

</html>
