<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/optionsDialog.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Options</title>
</head>

<body class="backgroundBody">

    <script src="js/createBot.js"></script>


    <div>
        <form>

            <div class="nameDiv">
                <input placeholder=" " class="nameInput" type="text" id="botName">
                <label class="nameLabel" for="botName">Bot Name</label>
            </div>

            <div class="tokenDiv">
                <input placeholder=" " class="tokenInput" type="text" id="botToken">
                <label class="tokenLabel" for="botToken">Bot Token</label>
            </div>

            <div class="prefixDiv">
                <input placeholder=" " class="prefixInput" type="text" id="botPrefix">
                <label class="prefixLabel" for="botPrefix">Bot Prefix</label>
            </div>

            <input class="optionsSaveButton" type="button" value="Save" id="submitData">

        </form>
    </div>


</body>
</html>
