<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Builder</title>
    <link rel="stylesheet" href="css/startScreen.css">
</head>

<script src="js/createOptions.js"></script>

<body class="backgroundBody">

    <div class="buttons">

        <h2 class="startScreenText">Start</h2>


        <a class="startOpt" id="newBot">Create New Bot...</a>

        <a class="startOpt" onclick="createBot('john')">Open Existing Bot...</a>

    </div>

    <div class="recent">

        <h2 class="recentScreenText">Recent</h2>

        <script>
            const react = require('react');
            
        </script>

        <div class="recentBots">


            <p>This is where recent projects will show up</p>
            <p></p>


        </div>

    </div>

    <script>
        const {
            ipcRenderer
        } = require('electron');

        document.getElementById('newBot').addEventListener('click', () => {

            ipcRenderer.send('dialog:newBot');

        });
    </script>


</body>

</html>
